<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Popup Preview (dev harness)</title>
  <style>
    body { margin: 0; background: #ddd; font-family: sans-serif; }
    .frame { width: 360px; margin: 24px auto; box-shadow: 0 4px 24px rgba(0,0,0,.25);
             border-radius: 8px; overflow: hidden; background: #fafafa; }
    .note { width: 360px; margin: 8px auto; font-size: 12px; color: #555; }
  </style>
  <!--
    Dev-only harness: shims the (promise-based) WebExtension APIs the popup uses
    and loads the REAL built popup bundle (../dist/popup.js) against a running
    backend. Lets us exercise the actual popup UI in a plain browser.
  -->
  <script>
    const TEST_URL = new URLSearchParams(location.search).get("pageUrl")
      || "http://example.com/sample-article";
    const API_URL = "http://127.0.0.1:8031/api/v1";

    const store = { apiUrl: API_URL };
    window.chrome = {
      tabs: {
        query: async () => [{ id: 1, url: TEST_URL }],
        sendMessage: async () => ({ ok: false, error: "no content script in harness" }),
        get: async () => ({ id: 1, url: TEST_URL }),
        onUpdated: { addListener: () => {} },
        onActivated: { addListener: () => {} },
      },
      runtime: {
        sendMessage: async (msg) => { console.log("[shim] sendMessage", msg); },
        onMessage: { addListener: () => {} },
      },
      storage: {
        local: {
          get: async (keys) => {
            if (typeof keys === "string") return { [keys]: store[keys] };
            return { ...store };
          },
          set: async (obj) => { Object.assign(store, obj); },
          remove: async (k) => { delete store[k]; },
        },
      },
      action: {
        setBadgeText: () => {}, setBadgeBackgroundColor: () => {},
      },
    };
  </script>
</head>
<body>
  <div class="note">Dev harness — real popup bundle, test backend. Page under test: <span id="u"></span></div>
  <div class="frame"><div id="root"></div></div>
  <script>
    document.getElementById("u").textContent =
      new URLSearchParams(location.search).get("pageUrl") || "http://example.com/sample-article";
  </script>
  <script src="../dist/popup.js"></script>
</body>
</html>
